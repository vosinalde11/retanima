<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silvestre — retánima</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Special+Elite&display=swap">

<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
html,body{overflow-x:hidden}
body{background:#e8e4da;-webkit-font-smoothing:antialiased}
#cur-dot{position:fixed;width:7px;height:7px;background:#5b9fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease;box-shadow:0 0 8px #5b9fff;}
#cur-ring{position:fixed;width:36px;height:36px;border:2px solid #5b9fff;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease,opacity .3s;opacity:.7;}
body.cur-hover #cur-ring{width:52px;height:52px;opacity:1;}
body.cur-hover #cur-dot{transform:translate(-50%,-50%) scale(0);}

header{position:fixed;top:0;left:0;right:0;z-index:900;height:56px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 clamp(20px,4vw,52px);background:rgba(0,0,0,.18);backdrop-filter:blur(12px);}
.hdr-logo{display:flex;align-items:center;text-decoration:none;margin-left:-32px;margin-top:-9px;}
.hdr-logo img{width:122px;height:122px;object-fit:contain;}
nav.hdr-nav{display:flex;align-items:center;gap:clamp(24px,3.5vw,52px);}
nav.hdr-nav a{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;text-decoration:none;color:#fff;transition:opacity .2s;}
nav.hdr-nav a:hover{opacity:.55}
.hdr-lang{display:flex;justify-content:flex-end;align-items:center;gap:5px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;color:#fff;background:none;border:none;padding:0;}
.hdr-lang span.active{font-weight:600}.hdr-lang .sep{opacity:.4}

/* VIDEO HERO 1080p horizontal */
.hero{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#e8e4da;line-height:0}
.hero video{width:100%;height:100%;display:block;object-fit:contain;object-position:center center}

.rl{position:absolute;top:72px;left:clamp(20px,5vw,60px);z-index:3;font-family:"Special Elite",monospace;font-size:clamp(8px,1.2vw,14px);letter-spacing:.2em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:8px}
.dot{width:clamp(6px,.9vw,9px);height:clamp(6px,.9vw,9px);border-radius:50%;background:#fff;animation:blink 1.4s steps(2) infinite;flex:none}
@keyframes blink{50%{opacity:.2}}

.rp{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;transition:opacity .3s;cursor:pointer}
.rp circle{stroke:#fff;stroke-width:1.5;fill:rgba(255,255,255,.12)}
.rp path{fill:#fff}
.hero.on .rp{opacity:0}

/* STAGE */
.stage{position:relative;width:100%;line-height:0;margin-top:-1px}
.stage>.bg{width:100%;height:auto;display:block;user-select:none;pointer-events:none}

.item{position:absolute;line-height:0;opacity:0;transform:translateY(48px) rotate(1.5deg);transition:opacity 1.1s cubic-bezier(.16,.84,.34,1),transform 1.1s cubic-bezier(.16,.84,.34,1),filter .45s ease}
.item:nth-child(even){transform:translateY(48px) rotate(-1.5deg);transition-delay:.12s}
.item img{width:100%;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.09))}
.item.vis{opacity:1;transform:none}
.item.vis:hover{transform:scale(1.03);filter:drop-shadow(0 2% 3% rgba(10,20,10,.25));z-index:50;transition-delay:0s}

.doble2-recorte{
  overflow:hidden;
}

.doble2-recorte img{
  width:200%;
  max-width:none;
  margin-left:-100%;
}

.doble2-recorte-izq{
  overflow:hidden;
}

.doble2-recorte-izq img{
  width:200%;
  max-width:none;
  margin-left:0;
}

.page{cursor:zoom-in}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.88);visibility:hidden;opacity:0;display:flex;align-items:center;justify-content:center;cursor:zoom-out;transition:opacity .3s,visibility .3s}
#lb.open{visibility:visible;opacity:1;backdrop-filter:blur(6px)}
#lb img{max-width:92vw;max-height:90vh;object-fit:contain;cursor:default;transform:scale(.9);transition:transform .35s cubic-bezier(.16,.84,.34,1)}
#lb.open img{transform:scale(1)}
#lb-x{position:fixed;top:22px;right:28px;font-family:"Special Elite",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#fff;cursor:pointer;opacity:.7}
#lb-x:hover{opacity:1}
</style>
</head>

<body>

<header>
  <a href="retanima.html" class="hdr-logo"><img src="../home/reduccion de logo.png" alt="retánima"></a>
  <nav class="hdr-nav">
    <a href="sobre-mi.html">sobre mí</a>
    <a href="retanima.html">proyectos</a>
    <a href="contacto.html">contacto</a>
  </nav>
  <button class="hdr-lang"><span class="active">ES</span><span class="sep">/</span><span>EN</span></button>
</header>

<div class="hero" id="hbox">
  <span class="rl"><span class="dot"></span>&nbsp;Silvestre</span>
  <video id="hv" src="SILVESTRE/AnimaciónSilvestre.mp4" muted loop playsinline preload="metadata"></video>
  <div class="rp" id="hplay">
    <svg width="72" height="72" viewBox="0 0 80 80"><circle cx="40" cy="40" r="38"/><path d="M33 26l24 14-24 14V26z"/></svg>
  </div>
</div>

<div class="stage">
  <img class="bg" src="SILVESTRE/FondoSilvestre.jpg" alt="">

  <div class="item page" style="left:10%;top:7%;width:35%;transform:rotate(-5deg)"><img src="SILVESTRE/Portada1Silvestre.jpg" alt=""></div>
  <div class="item page" style="left:6%;top:31.1%;width:40%;transform:rotate(-5deg)"><img src="SILVESTRE/Dobles/Doble1Silvestre.jpg" alt=""></div>

  <div class="item page doble2-recorte" style="left:57%;top:23%;width:30%;transform:rotate(5deg)""><img src="SILVESTRE/Dobles/Doble2Silvestre.jpg" alt=""></div>
  <div class="item page" style="left:9%;top:46%;width:40%;transform:rotate(-5deg)"><img src="SILVESTRE/Dobles/Doble3Silvestre.jpg" alt=""></div>

  <div class="item page" style="left:11%;top:65%;width:23%"><img src="SILVESTRE/Portada1Silvestre.jpg" alt=""></div>
  <div class="item page" style="left:38%;top:65%;width:23%"><img src="SILVESTRE/Portada2Silvestre.jpg" alt=""></div>
  <div class="item page" style="left:65%;top:65%;width:23%"><img src="SILVESTRE/Portada3Silvestre.jpg" alt=""></div>

  <div class="item page" style="left:52%;top:44.4%;width:40%;transform:rotate(-5deg)"><img src="SILVESTRE/Dobles/Doble4Silvestre.jpg" alt=""></div>
  <div class="item page" style="left:48%;top:85%;width:45%;transform:rotate(-5deg)"><img src="SILVESTRE/Dobles/Doble5Silvestre.jpg" alt=""></div>

  <div class="item page doble2-recorte-izq"
     style="left:10.5%;top:82.5%;width:30%">
    <img src="SILVESTRE/Dobles/Doble2Silvestre.jpg" alt="">
</div>
</div>

<div id="lb"><img id="lb-img" alt=""><span id="lb-x">Cerrar ✕</span></div>

<script>
const io=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target);}});
},{threshold:.04});
document.querySelectorAll('.item').forEach(el=>{
  io.observe(el);
  const base=el.style.transform||'';
  el.addEventListener('mouseenter',()=>{if(el.classList.contains('vis'))el.style.transform=(base?base+' ':'')+' scale(1.05)';});
  el.addEventListener('mouseleave',()=>{el.style.transform=base;});
});

const lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img');
function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}

document.querySelectorAll('.page img').forEach(img=>{
  img.addEventListener('click',e=>{
    e.stopPropagation();
    lbImg.src=img.src;
    lb.classList.add('open');
    document.body.style.overflow='hidden';
  });
});

lb.addEventListener('click',closeLb);
document.getElementById('lb-x').addEventListener('click',e=>{e.stopPropagation();closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

const hv=document.getElementById('hv'),hbox=document.getElementById('hbox');

new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(e.isIntersecting){hv.play().catch(()=>{});hbox.classList.add('on');}
    else{hv.pause();hbox.classList.remove('on');}
  });
},{threshold:.2}).observe(hbox);

hbox.addEventListener('click',()=>{
  if(hv.paused){hv.play();hbox.classList.add('on');}
  else{hv.pause();hbox.classList.remove('on');}
});
</script>

<div id="cur-dot"></div>
<div id="cur-ring"></div>
<script>
const curDot=document.getElementById('cur-dot'),curRing=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
document.querySelectorAll('a,button,.page').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('cur-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('cur-hover'));});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curRing.style.left=rx+'px';curRing.style.top=ry+'px';requestAnimationFrame(a);})();
</script>
</body>
</html>
