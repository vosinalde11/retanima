<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundos Fragmentados — retánima</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Special+Elite&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
html,body{overflow-x:hidden}
body{background:#71798a;-webkit-font-smoothing:antialiased;color:#fff}
#cur-dot{position:fixed;width:7px;height:7px;background:#5b9fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease;box-shadow:0 0 8px #5b9fff;}
#cur-ring{position:fixed;width:36px;height:36px;border:2px solid #5b9fff;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease,opacity .3s;opacity:.7;}
body.cur-hover #cur-ring{width:52px;height:52px;opacity:1;}
body.cur-hover #cur-dot{transform:translate(-50%,-50%) scale(0);}

header{position:fixed;top:16px;left:50%;transform:translateX(-50%);width:calc(100% - 48px);max-width:1300px;z-index:900;height:52px;background:rgba(85, 102, 126, 0.5);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.14);border-radius:40px;box-shadow:0 0 40px rgba(0,0,0,.50);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 clamp(20px,4vw,40px);}
.hdr-logo{display:flex;align-items:center;text-decoration:none;margin-top:-5px;}
.hdr-logo img{width:58px;height:58px;object-fit:contain;}
nav.hdr-nav{display:flex;align-items:center;gap:clamp(28px,3.5vw,54px);margin-top:-5px;}
nav.hdr-nav a{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;text-decoration:none;color:#fff;transition:opacity .2s;position:relative;}
nav.hdr-nav a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#fff;transition:width .2s ease;}
nav.hdr-nav a:hover{opacity:.55}
nav.hdr-nav a:hover::after{width:100%;}
.nav-proyectos{position:relative;}
.nav-proy-btn{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;color:#fff;background:none;border:none;cursor:pointer;padding:0;transition:opacity .2s;position:relative;top:-0.5px;}
.nav-proy-btn::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#fff;transition:width .2s ease;}
.nav-proy-btn:hover{opacity:.55;}
.nav-proy-btn:hover::after{width:100%;}
.proy-dropdown{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%);background:rgba(20,20,30,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 0;min-width:220px;visibility:hidden;opacity:0;transition:opacity .2s,visibility .2s;z-index:999;}
.nav-proyectos.open .proy-dropdown{visibility:visible;opacity:1;}
.proy-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-family:'Inter',sans-serif;font-size:12px;font-weight:300;letter-spacing:.05em;color:#fff;text-decoration:none;white-space:nowrap;background:none;border:none;width:100%;cursor:pointer;transition:background .15s;}
.proy-item:hover{background:rgba(255,255,255,.08);}
.proy-item .proy-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-left:auto;}
.proy-divider{height:1px;background:rgba(255,255,255,.1);margin:4px 0;}
.hdr-lang{display:flex;justify-content:flex-end;align-items:center;gap:5px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;color:#fff;background:none;border:none;padding:0;margin-top:-5px;}
.hdr-lang span.active{font-weight:600}.hdr-lang .sep{opacity:.4}

/* INTRO */
.intro{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#71798a;
}
.intro-cover{
  width:100%;
  height:100vh;
  object-fit:cover;
  object-position:center top;
  display:block;
}
.intro-scroll{
  position:absolute;
  bottom:32px;
  left:50%;
  transform:translateX(-50%);
  font-family:"Special Elite",monospace;
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#fff;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:.55;
  animation:fadeIn 1.2s 1.2s both;
}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:.55;transform:translateX(-50%) translateY(0)}}

.dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.4s steps(2) infinite;flex:none}
@keyframes blink{50%{opacity:.25}}

/* GALLERY */
.gallery{
  padding:clamp(32px,5vw,70px) clamp(24px,6vw,80px) clamp(40px,5vw,70px);
}
.gallery-head{
  display:flex;
  align-items:baseline;
  gap:18px;
  border-top:1px solid rgba(255,255,255,.14);
  padding-top:22px;
  margin-bottom:clamp(20px,3.5vw,44px);
}
.gallery-head h2{
  font-family:"Archivo Black",sans-serif;
  font-size:clamp(20px,2.8vw,40px);
  letter-spacing:-.03em;
}
.gallery-head span{
  font-family:"Special Elite",monospace;
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  opacity:.45;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(10px,1.8vw,22px);
}
.gitem{
  line-height:0;
  opacity:0;
  transform:translateY(38px);
  transition:opacity .95s cubic-bezier(.16,.84,.34,1),transform .95s cubic-bezier(.16,.84,.34,1);
  cursor:zoom-in;
  border-radius:3px;
  overflow:hidden;
}
.gitem img{
  width:100%;
  display:block;
  filter:drop-shadow(0 10px 26px rgba(15,20,30,.32));
  transition:transform .4s ease,filter .4s ease;
  border-radius:3px;
}
.gitem.vis{opacity:1;transform:none}
.gitem.vis:hover img{transform:scale(1.025);filter:drop-shadow(0 16px 40px rgba(15,20,30,.5))}
.gitem.span2{grid-column:span 2}
.gitem.span3{grid-column:span 3}

/* TEXT CARDS */
.gtext-card{
  width:100%;height:100%;min-height:220px;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:clamp(18px,2.2vw,30px);
  position:relative;overflow:hidden;border-radius:3px;
}
.gtext-card .gc-ghost{
  position:absolute;
  font-family:"Archivo Black",sans-serif;
  font-size:clamp(90px,16vw,220px);
  line-height:1;letter-spacing:-.05em;
  opacity:.06;pointer-events:none;user-select:none;color:#fff;
}
.gtext-card .gc-label{
  font-family:"Special Elite",monospace;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  opacity:.45;margin-bottom:10px;
}
.gtext-card .gc-quote{
  font-family:"Special Elite",monospace;
  font-size:clamp(12px,1.2vw,16px);line-height:1.65;letter-spacing:.04em;
}
.gtext-card .gc-title{
  font-family:"Archivo Black",sans-serif;
  font-size:clamp(22px,3.2vw,46px);line-height:.88;
  letter-spacing:-.04em;margin-bottom:10px;
}
.gtext-card .gc-swirl{
  position:absolute;opacity:.09;pointer-events:none;
}

/* BOOK VIEWER */
.book-section{
  padding:clamp(32px,5vw,70px) clamp(24px,6vw,80px) clamp(60px,8vw,100px);
}
.book-head{
  border-top:1px solid rgba(255,255,255,.14);
  padding-top:22px;
  margin-bottom:clamp(20px,3vw,40px);
  display:flex;
  align-items:baseline;
  gap:18px;
}
.book-head h2{
  font-family:"Archivo Black",sans-serif;
  font-size:clamp(20px,2.8vw,40px);
  letter-spacing:-.03em;
}
.book-head span{
  font-family:"Special Elite",monospace;
  font-size:10px;
  letter-spacing:.22em;
  text-transform:uppercase;
  opacity:.45;
}
.book-viewer{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(12px,2vw,28px);
}
.book-spread{
  width:min(1200px,78vw);
  display:grid;
  grid-template-columns:1fr 1fr;
  background:#f5f3ee;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 28px 80px rgba(0,0,0,.32),0 0 0 1px rgba(255,255,255,.1);
}
.book-spread.single{
  grid-template-columns:1fr;
  width:min(300px,19.5vw);
}
.book-spread img{width:100%;display:block;background:#f5f3ee}
.book-spread img:first-child{border-right:1px solid rgba(0,0,0,.07)}
.book-spread.single img:first-child{border-right:none}
.book-btn{
  border:none;
  background:rgba(255,255,255,.11);
  backdrop-filter:blur(10px);
  color:#fff;
  width:54px;height:54px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
  transition:.25s ease;
  flex:none;
}
.book-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.07)}
.book-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}
.book-counter{
  text-align:center;
  margin-top:16px;
  font-family:"Special Elite",monospace;
  letter-spacing:.16em;
  font-size:11px;
  opacity:.7;
}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.9);visibility:hidden;opacity:0;display:flex;align-items:center;justify-content:center;cursor:zoom-out;transition:opacity .3s,visibility .3s}
#lb.open{visibility:visible;opacity:1;backdrop-filter:blur(6px)}
#lb img{max-width:92vw;max-height:90vh;object-fit:contain;transform:scale(.9);transition:transform .35s cubic-bezier(.16,.84,.34,1)}
#lb.open img{transform:scale(1)}
#lb-x{position:fixed;top:22px;right:28px;font-family:"Special Elite",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#fff;cursor:pointer;opacity:.75}
#lb-x:hover{opacity:1}

@media(max-width:700px){
  .grid{grid-template-columns:1fr 1fr}
  .gitem.span2{grid-column:span 2}
  .gitem.span3{grid-column:span 2}
  .book-spread{width:82vw}
  .book-spread.single{width:22vw}
  .book-btn{width:40px;height:40px;font-size:17px}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .gitem.span2,.gitem.span3{grid-column:span 1}
}
</style>
</head>
<body>

<header>
  <a href="retanima.html" class="hdr-logo"><img src="../home/ReduccionLogo.svg" alt="retánima"></a>
  <nav class="hdr-nav">
    <a href="sobre-mi.html">sobre mí</a>
    <span class="nav-proyectos" id="navProy">
      <button class="nav-proy-btn">proyectos</button>
      <div class="proy-dropdown">
        <a class="proy-item" href="PUNKED - Galeria.html">PUNKED <span class="proy-tag">editorial</span></a>
        <a class="proy-item" href="Silvestre - Galeria.html">SILVESTRE <span class="proy-tag">editorial</span></a>
        <a class="proy-item" href="MundosFragmentados.html">MUNDOS FRAGMENTADOS <span class="proy-tag">editorial</span></a>
        <div class="proy-divider"></div>
        <a class="proy-item" href="retanima.html#team">TEAM VIDEOCLIP <span class="proy-tag">video</span></a>
        <a class="proy-item" href="retanima.html#rotoscopia">ROTOSCOPIA — ANIMACIÓN 2D <span class="proy-tag">video</span></a>
        <a class="proy-item" href="retanima.html#interestelar">REGRESO INTERESTELAR <span class="proy-tag">video</span></a>
      </div>
    </span>
    <a href="contacto.html">contacto</a>
  </nav>
  <button class="hdr-lang"><span class="active">ES</span><span class="sep">/</span><span>EN</span></button>
</header>

<!-- INTRO -->
<section class="intro">
  <img class="intro-cover" src="../MundosFragmentados/PortadaMundosFragmentados.png" alt="Portada Mundos Fragmentados">
  <div class="intro-scroll"><span class="dot"></span>Scroll</div>
</section>

<!-- GALLERY GRID -->
<section class="gallery">
  <div class="grid">
    <!-- Portada portrait (1 col) -->
    <div class="gitem" style="transform:translateY(38px) rotate(-1.2deg)">
      <img src="MUNDOS/PortadaMundos.jpg" alt="Portada Mundos Fragmentados">
    </div>
    <!-- Doble spread landscape (2 col) -->
    <div class="gitem span2" style="transform:translateY(38px) rotate(.5deg)">
      <img src="MUNDOS/DobleCiudadEcos.jpg" alt="Ciudad de los Ecos">
    </div>

    <!-- Doble spread landscape (2 col) -->
    <div class="gitem span2" style="transform:translateY(38px) rotate(-.6deg)">
      <img src="MUNDOS/DobleEsfera.jpg" alt="Doble Esfera">
    </div>
    <!-- Single portrait (1 col) -->
    <div class="gitem" style="transform:translateY(38px) rotate(1.4deg)">
      <img src="MUNDOS/FotoMemoria.jpg" alt="Foto Memoria">
    </div>

    <div class="gitem" style="transform:translateY(38px) rotate(-1deg)">
      <img src="MUNDOS/IndiceNumeros.jpg" alt="Índice">
    </div>
    <div class="gitem" style="transform:translateY(38px) rotate(.9deg)">
      <img src="MUNDOS/PaginaAzul.jpg" alt="Página Azul">
    </div>
    <div class="gitem" style="transform:translateY(38px) rotate(-1.6deg);margin-top:-65%">
      <img src="MUNDOS/ContratapaMundos.jpg" alt="Contratapa">
    </div>

    <!-- Doble spread full-width bottom -->
    <div class="gitem span3" style="transform:translateY(38px)">
      <img src="MUNDOS/DobleMancha.jpg" alt="Doble Mancha">
    </div>
  </div>
</section>

<!-- LIBRO INTERACTIVO -->
<section class="book-section">
  <p style="font-family:'Special Elite',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.45;margin-bottom:clamp(16px,2.5vw,28px)">Tomo III · 31 páginas</p>
  <div class="book-viewer">
    <button id="prevBook" class="book-btn">←</button>
    <div id="bookSpread" class="book-spread">
      <img id="leftPage" alt="">
      <img id="rightPage" alt="">
    </div>
    <button id="nextBook" class="book-btn">→</button>
  </div>
  <div id="pageCounter" class="book-counter"></div>
</section>

<div id="lb"><img id="lb-img" alt=""><span id="lb-x">Cerrar ✕</span></div>

<script>
/* SCROLL REVEAL */
const io=new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('vis');
      io.unobserve(e.target);
    }
  });
},{threshold:.04});
document.querySelectorAll('.gitem').forEach(el=>io.observe(el));

/* LIGHTBOX */
const lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img');
function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.gitem img').forEach(img=>{
  img.addEventListener('click',e=>{
    e.stopPropagation();
    lbImg.src=img.src;
    lb.classList.add('open');
    document.body.style.overflow='hidden';
  });
});
lb.addEventListener('click',closeLb);
document.getElementById('lb-x').addEventListener('click',e=>{e.stopPropagation();closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

/* BOOK VIEWER */
const totalPages=31;
const maxSpread=16;
const pages=[];
for(let i=1;i<=totalPages;i++){
  pages.push(`../MundosFragmentados/P%C3%A1ginas/P%C3%A1gina%20(${i}).jpg`);
}
const bookSpread=document.getElementById("bookSpread");
const leftPage=document.getElementById("leftPage");
const rightPage=document.getElementById("rightPage");
const counter=document.getElementById("pageCounter");
const prevBook=document.getElementById("prevBook");
const nextBook=document.getElementById("nextBook");
let spread=0;

function renderBook(){
  if(spread===0){
    bookSpread.classList.add("single");
    leftPage.src=pages[0];
    rightPage.style.display="none";
    counter.textContent="Portada";
    prevBook.disabled=true;
    nextBook.disabled=false;
    return;
  }
  if(spread===maxSpread){
    bookSpread.classList.add("single");
    leftPage.src=pages[totalPages-1];
    rightPage.style.display="none";
    counter.textContent="Contratapa";
    prevBook.disabled=false;
    nextBook.disabled=true;
    return;
  }
  bookSpread.classList.remove("single");
  const leftIndex=spread*2-1;
  const rightIndex=spread*2;
  const hasRight=rightIndex<totalPages-1;
  leftPage.src=pages[leftIndex];
  if(hasRight){
    rightPage.src=pages[rightIndex];
    rightPage.style.display="block";
    counter.textContent=`Páginas ${leftIndex+1}–${rightIndex+1}`;
  }else{
    rightPage.style.display="none";
    counter.textContent=`Página ${leftIndex+1}`;
  }
  prevBook.disabled=false;
  nextBook.disabled=false;
}
nextBook.addEventListener("click",()=>{if(spread<maxSpread){spread++;renderBook();}});
prevBook.addEventListener("click",()=>{if(spread>0){spread--;renderBook();}});
renderBook();

</script>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<script>
const curDot=document.getElementById('cur-dot'),curRing=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
document.querySelectorAll('a,button,.gitem,.book-btn').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('cur-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('cur-hover'));});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curRing.style.left=rx+'px';curRing.style.top=ry+'px';requestAnimationFrame(a);})();
const navProy=document.getElementById('navProy');
navProy.addEventListener('click',e=>{e.stopPropagation();navProy.classList.toggle('open');});
document.addEventListener('click',()=>navProy.classList.remove('open'));
</script>
</body>
