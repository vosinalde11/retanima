<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUNKED — Vivienne Westwood · retánima</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
html,body{overflow-x:hidden}
body{background:#e9e5db;-webkit-font-smoothing:antialiased}
#cur-dot{position:fixed;width:7px;height:7px;background:#5b9fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease;box-shadow:0 0 8px #5b9fff;}
#cur-ring{position:fixed;width:36px;height:36px;border:2px solid #5b9fff;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease,opacity .3s;opacity:.7;}
body.cur-hover #cur-ring{width:52px;height:52px;opacity:1;}
body.cur-hover #cur-dot{transform:translate(-50%,-50%) scale(0);}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:900;height:80px;background:#63b3ed;display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:14px clamp(20px,4vw,52px) 0;}
.hdr-logo{display:flex;align-items:center;text-decoration:none;margin-left:-32px;margin-top:0;}
.hdr-logo img{width:122px;height:122px;object-fit:contain;}
nav.hdr-nav{display:flex;align-items:center;gap:clamp(24px,3.5vw,52px);}
nav.hdr-nav a{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;text-decoration:none;color:#fff;transition:opacity .2s;}
nav.hdr-nav a:hover{opacity:.55}
.nav-proyectos{position:relative;}
.nav-proy-btn{font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;color:#fff;background:none;border:none;cursor:pointer;padding:0;transition:opacity .2s;}
.nav-proy-btn:hover{opacity:.55;}
.proy-dropdown{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%);background:rgba(20,20,30,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 0;min-width:220px;visibility:hidden;opacity:0;transition:opacity .2s,visibility .2s;z-index:999;}
.nav-proyectos.open .proy-dropdown{visibility:visible;opacity:1;}
.proy-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-family:'Inter',sans-serif;font-size:12px;font-weight:300;letter-spacing:.05em;color:#fff;text-decoration:none;white-space:nowrap;background:none;border:none;width:100%;cursor:pointer;transition:background .15s;}
.proy-item:hover{background:rgba(255,255,255,.08);}
.proy-item .proy-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-left:auto;}
.proy-divider{height:1px;background:rgba(255,255,255,.1);margin:4px 0;}
.hdr-lang{display:flex;justify-content:flex-end;align-items:center;gap:5px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;letter-spacing:.03em;color:#fff;background:none;border:none;padding:0;}
.hdr-lang span.active{font-weight:600}.hdr-lang .sep{opacity:.4}

/* STAGE */
.stage{position:relative;width:100%;line-height:0}
.stage>.bg{width:100%;height:auto;display:block;user-select:none}

/* ITEMS posicionados como % del stage */
.item{position:absolute;line-height:0}
.item img,.item .reel-wrap{width:100%;display:block}

/* HOVER */
.item{transition:transform .45s cubic-bezier(.16,.84,.34,1),filter .45s ease;cursor:pointer}
.item:hover{transform:translateY(-1%) scale(1.025);filter:drop-shadow(0 2% 3% rgba(20,10,20,.35));z-index:50}

/* REEL */
.reel-wrap{position:relative;overflow:hidden;background:#e6007e;aspect-ratio:9/16}
.reel-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.reel-lbl{position:absolute;top:8%;left:10%;z-index:3;font-family:"Special Elite",monospace;font-size:clamp(8px,1.2vw,14px);letter-spacing:.2em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:6%}
.dot{width:clamp(6px,1vw,10px);height:clamp(6px,1vw,10px);border-radius:50%;background:#fff;animation:blink 1.4s steps(2) infinite;flex:none}
@keyframes blink{50%{opacity:.2}}
.reel-play{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
.reel-play circle{stroke:#fff;stroke-width:1.5;fill:rgba(255,255,255,.15)}
.reel-play path{fill:#fff}
.reel-wrap.playing .reel-play{opacity:0}

/* REVEAL */
.item{opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.16,.84,.34,1),transform .9s cubic-bezier(.16,.84,.34,1),filter .45s ease}
.item.vis{opacity:1;transform:none}
.item.vis:hover{transform:translateY(-1%) scale(1.025)}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.9);visibility:hidden;opacity:0;display:flex;align-items:center;justify-content:center;cursor:zoom-out;transition:opacity .3s,visibility .3s}
#lb.open{visibility:visible;opacity:1;backdrop-filter:blur(4px)}
#lb img{max-width:92vw;max-height:90vh;object-fit:contain;cursor:default;transform:scale(.92);transition:transform .3s cubic-bezier(.16,.84,.34,1)}
#lb.open img{transform:scale(1)}
#lb-x{position:fixed;top:22px;right:28px;font-family:"Special Elite",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#fff;cursor:pointer;opacity:.8}
#lb-x:hover{opacity:1}
.item img{cursor:zoom-in}
</style>
</head>
<body>

<header>
  <a href="retanima.html" class="hdr-logo"><img src="../home/reduccion de logo.png" alt="retánima"></a>
  <nav class="hdr-nav">
    <a href="sobre-mi.html">sobre mí</a>

      <button class="nav-proy-btn">proyectos</button>

</header>

<div class="stage">
  <!-- FONDO BASE -->
  <img class="bg" src="assets/FondoPunked.jpg" alt="">

  <!-- 1 · Portada mockup -->
  <div class="item" style="left:50%;top:17%;width:41%">

  <!-- 5 · Programa -->

</div><!-- /stage -->

<!-- LIGHTBOX -->
<div id="lb"><img id="lb-img" alt=""><span id="lb-x">Cerrar ✕</span></div>

<script>
// Reveal on scroll
const io = new IntersectionObserver(es => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); io.unobserve(e.target); } });
}, {threshold:.06});
document.querySelectorAll('.item').forEach(el => io.observe(el));

// Lightbox
const lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img');
function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.item img').forEach(img=>{
  img.addEventListener('click',e=>{e.stopPropagation();lbImg.src=img.src;lb.classList.add('open');document.body.style.overflow='hidden';});
});
lb.addEventListener('click',closeLb);
document.getElementById('lb-x').addEventListener('click',e=>{e.stopPropagation();closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

// Dropdown proyectos
const navProy=document.getElementById('navProy');
navProy.addEventListener('click',e=>{e.stopPropagation();navProy.classList.toggle('open');});
document.addEventListener('click',()=>navProy.classList.remove('open'));

// Reel
const vid = document.getElementById('reelEl');
const box = document.getElementById('reelBox');
if(vid && box){
  new IntersectionObserver(es => {
    es.forEach(e => {
      if(e.isIntersecting){ vid.play().catch(()=>{}); box.classList.add('playing'); }
      else { vid.pause(); box.classList.remove('playing'); }
    });
  }, {threshold:.3}).observe(box);
  box.addEventListener('click', () => {
    if(vid.paused){ vid.play(); box.classList.add('playing'); }
    else { vid.pause(); box.classList.remove('playing'); }
  });
}
</script>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<script>
const curDot=document.getElementById('cur-dot'),curRing=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
document.querySelectorAll('a,button,.gitem,.vid-box').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('cur-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('cur-hover'));});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curRing.style.left=rx+'px';curRing.style.top=ry+'px';requestAnimationFrame(a);})();
</script>
