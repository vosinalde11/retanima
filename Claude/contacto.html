<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contacto — retánima</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
html,body{overflow-x:hidden}
body{background:#57729c;-webkit-font-smoothing:antialiased;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
#cur-dot{position:fixed;width:7px;height:7px;background:#5b9fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease;box-shadow:0 0 8px #5b9fff;}
#cur-ring{position:fixed;width:36px;height:36px;border:2px solid #5b9fff;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease,opacity .3s;opacity:.7;}
body.cur-hover #cur-ring{width:52px;height:52px;opacity:1;}
body.cur-hover #cur-dot{transform:translate(-50%,-50%) scale(0);}

header{
  position:fixed;top:0;left:0;right:0;z-index:900;height:56px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:0 clamp(20px,4vw,52px);
}
.hdr-logo{display:flex;align-items:center;text-decoration:none;margin-left:-32px;margin-top:-9px;}
.hdr-logo img{width:122px;height:122px;object-fit:contain;}
nav.hdr-nav{display:flex;align-items:center;gap:clamp(24px,3.5vw,52px);}
nav.hdr-nav a{
  font-family:'Inter',sans-serif;font-size:13px;font-weight:300;
  letter-spacing:.03em;text-decoration:none;color:#fff;transition:opacity .2s;
}
nav.hdr-nav a:hover{opacity:.55}
.hdr-lang{
  display:flex;justify-content:flex-end;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:300;
  letter-spacing:.03em;cursor:pointer;color:#fff;background:none;border:none;padding:0;
}
.hdr-lang span.active{font-weight:600}
.hdr-lang .sep{opacity:.4}

/* CONTACTO */
.contacto{
  flex:1;
  padding:calc(56px + clamp(50px,7vw,90px)) clamp(24px,6vw,80px) clamp(40px,5vw,70px);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:clamp(40px,6vw,80px);
}
.contacto-top h1{
  font-family:'Helvetica Neue','Helvetica',Arial,sans-serif;
  font-weight:700;
  font-size:clamp(52px,9vw,130px);
  letter-spacing:-.04em;
  line-height:.9;
}
.contacto-top p{
  font-family:'Inter',sans-serif;
  font-weight:300;
  font-size:clamp(13px,1.1vw,16px);
  line-height:1.75;
  opacity:.5;
  max-width:420px;
  margin-top:clamp(14px,1.8vw,24px);
  /* COMPLETAR: breve frase de apertura */
}
.contacto-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:clamp(24px,3vw,48px) clamp(32px,4vw,60px);
  border-top:1px solid rgba(255,255,255,.1);
  padding-top:clamp(24px,3vw,40px);
}
.clink-group{display:flex;flex-direction:column;gap:6px;}
.clink-label{
  font-family:'Inter',sans-serif;
  font-size:9px;
  font-weight:400;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:.35;
  margin-bottom:2px;
}
.clink{
  font-family:'Helvetica Neue','Helvetica',Arial,sans-serif;
  font-weight:400;
  font-size:clamp(14px,1.3vw,18px);
  color:#fff;
  text-decoration:none;
  letter-spacing:-.01em;
  transition:opacity .2s;
  display:block;
}
.clink:hover{opacity:.45;}

/* FOOTER */
footer{
  border-top:1px solid rgba(255,255,255,.1);
  padding:clamp(24px,3vw,36px) clamp(24px,6vw,80px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
}
.ft-brand{
  font-family:'Helvetica Neue','Helvetica',Arial,sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:-.01em;
  color:#fff;
  opacity:.35;
  text-decoration:none;
}
.ft-copy{
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:300;
  letter-spacing:.06em;
  opacity:.3;
}
.ft-links{
  display:flex;
  gap:clamp(16px,2vw,28px);
}
.ft-links a{
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:300;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#fff;
  text-decoration:none;
  opacity:.35;
  transition:opacity .2s;
}
.ft-links a:hover{opacity:.7;}

@media(max-width:680px){
  .contacto{flex-direction:column;gap:40px;}
}
</style>
</head>
<body>

<header>
  <a href="retanima.html" class="hdr-logo">
    <img src="../home/reduccion de logo.png" alt="retánima">
  </a>
  <nav class="hdr-nav">
    <a href="sobre-mi.html">sobre mí</a>
    <a href="retanima.html">proyectos</a>
    <a href="contacto.html">contacto</a>
  </nav>
  <button class="hdr-lang">
    <span class="active">ES</span><span class="sep">/</span><span>EN</span>
  </button>
</header>

<section class="contacto">
  <div class="contacto-top">
    <h1>hablemos.</h1>
    <p><!-- COMPLETAR: breve frase de apertura --></p>
  </div>

  <div class="contacto-grid">
    <div class="clink-group">
      <p class="clink-label">email</p>
      <a class="clink" href="mailto:dmvosinalde@gmail.com">dmvosinalde@gmail.com</a>
    </div>
    <div class="clink-group">
      <p class="clink-label">whatsapp</p>
      <a class="clink" href="https://wa.me/5492915757888" target="_blank" rel="noopener">+54 291 575-7888</a>
    </div>
    <div class="clink-group">
      <p class="clink-label">instagram</p>
      <a class="clink" href="https://www.instagram.com/retanima.ar" target="_blank" rel="noopener">@retanima.ar</a>
    </div>
    <div class="clink-group">
      <p class="clink-label">behance</p>
      <a class="clink" href="https://www.behance.net/victoriosinald" target="_blank" rel="noopener">victoriosinald</a>
    </div>
    <div class="clink-group">
      <p class="clink-label">pinterest</p>
      <a class="clink" href="https://ar.pinterest.com/victoriaaa014/" target="_blank" rel="noopener">victoriaaa014</a>
    </div>
    <div class="clink-group">
      <p class="clink-label">spotify</p>
      <a class="clink" href="https://open.spotify.com/user/sulg9igk27oea90nxc8qlkyg9?si=0b981acbe6254f13" target="_blank" rel="noopener">retānima</a>
    </div>
  </div>
</section>

<footer>
  <a href="retanima.html" class="ft-brand">retānima</a>
  <div class="ft-links">
    <a href="sobre-mi.html">sobre mí</a>
    <a href="retanima.html">proyectos</a>
    <a href="contacto.html">contacto</a>
  </div>
  <span class="ft-copy">© 2026 retānima</span>
</footer>

<div id="cur-dot"></div>
<div id="cur-ring"></div>
<script>
const curDot=document.getElementById('cur-dot'),curRing=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curDot.style.left=mx+'px';curDot.style.top=my+'px';});
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('cur-hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('cur-hover'));});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curRing.style.left=rx+'px';curRing.style.top=ry+'px';requestAnimationFrame(a);})();
</script>
</body>
</html>
